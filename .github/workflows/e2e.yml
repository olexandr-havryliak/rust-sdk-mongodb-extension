name: e2e

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sdk-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Rust unit tests (Docker; no host toolchain)
        run: |
          chmod +x e2e-tests/run-sdk-tests-docker.sh
          ./e2e-tests/run-sdk-tests-docker.sh

  docker-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4

      - name: End-to-end (Docker + MongoDB 8.3)
        run: |
          chmod +x e2e-tests/run-e2e.sh
          ./e2e-tests/run-e2e.sh

      - name: Random aggregation fuzz (same stack; short run)
        env:
          ITERATIONS: "1500"
        run: |
          chmod +x e2e-tests/run-fuzz-e2e.sh
          ./e2e-tests/run-fuzz-e2e.sh
